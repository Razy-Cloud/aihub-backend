# Fly.io 应用配置文件
# 文档: https://fly.io/docs/reference/configuration/

app = "aihub-backend"
primary_region = "nrt"  # 东京区域（离中国较近）

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[processes]
  app = "node src/index.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  
  [[http_service.concurrency]]
    type = "connections"
    hard_limit = 1000
    soft_limit = 900

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# 环境变量（敏感信息用 fly secrets 设置）
# DEEPSEEK_API_KEY
# JWT_SECRET
